name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      region:
        description: Google Cloud region
        required: true
        default: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy realtime service
        id: service
        run: |
          gcloud run deploy ludo-service \
            --source mini-services/ludo-service \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ inputs.region }}" \
            --allow-unauthenticated \
            --set-env-vars FIREBASE_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
            --min-instances 1 \
            --max-instances 1 \
            --concurrency 100 \
            --format="value(status.url)" > service-url.txt

      - name: Deploy web app
        run: |
          LUDO_SERVICE_URL="$(cat service-url.txt)"
          gcloud run deploy ludo-web \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ inputs.region }}" \
            --allow-unauthenticated \
            --set-env-vars NEXT_PUBLIC_LUDO_SOCKET_URL="$LUDO_SERVICE_URL",NEXT_PUBLIC_LUDO_SOCKET_PATH="/"
